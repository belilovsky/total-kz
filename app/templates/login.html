<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход – Total.kz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Onest',system-ui,sans-serif;background:#f5f6f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .login-card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
        .login-brand{text-align:center;margin-bottom:32px}
        .login-brand .brand-icon{width:56px;height:56px;background:#d83236;color:#fff;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin-bottom:12px}
        .login-brand h1{font-size:22px;font-weight:700;color:#1a1d26}
        .login-brand p{font-size:14px;color:#5c6370;margin-top:4px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:13px;font-weight:500;color:#5c6370;margin-bottom:6px}
        .form-group input{width:100%;padding:12px 14px;border:1.5px solid #e2e5ea;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border 0.18s ease}
        .form-group input:focus{border-color:#d83236}
        .login-btn{width:100%;padding:14px;background:#d83236;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.18s ease}
        .login-btn:hover{background:#c02d30}
        .error-msg{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
        .error-msg.show{display:block}
        .login-footer{text-align:center;margin-top:24px;font-size:12px;color:#9099a8}
        @media(prefers-color-scheme:dark){
            body{background:#0f1117}
            .login-card{background:#1a1d26;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
            .login-brand h1{color:#e8eaed}
            .login-brand p{color:#9ca3af}
            .form-group label{color:#9ca3af}
            .form-group input{background:#252830;border-color:#2a2d36;color:#e8eaed}
            .form-group input:focus{border-color:#d83236}
            .login-footer{color:#6b7280}
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon">T</div>
            <h1>Total.kz</h1>
            <p>Панель управления</p>
        </div>
        <div class="error-msg {% if error %}show{% endif %}" id="errorMsg">{{ error or '' }}</div>
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus value="{{ username or '' }}">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Войти</button>
        </form>
        <div class="login-footer">Total.kz CMS v11.0</div>
    </div>
</body>
</html>
