# total-kz — Docker Compose
# Platform standard: belilovsky-platform v1.0

services:
  app:
    build: .
    container_name: total_kz_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-3847}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - app_net

networks:
  app_net:
    name: total_kz_net
    driver: bridge
