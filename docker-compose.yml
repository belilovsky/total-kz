# total-kz — Docker Compose
# Platform standard: belilovsky-platform v1.0

services:
  app:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: total_kz_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-3847}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      - meilisearch
    networks:
      - app_net

  cron:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: total_kz_cron
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Cron started: fetch every 2 hours"
        while true; do
          /app/scraper/cron_fetch.sh >> /app/data/cron_fetch.log 2>&1
          sleep 7200
        done
    networks:
      - app_net

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: total_kz_meilisearch
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=total-kz-search-key-2026
      - MEILI_DB_PATH=/meili_data
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    networks:
      - app_net

  imgproxy:
    image: darthsim/imgproxy:v3.27
    container_name: total_kz_imgproxy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - IMGPROXY_BIND=:8080
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_ALLOWED_SOURCES=https://total.kz/,http://total.kz/
      - IMGPROXY_ENABLE_WEBP_DETECTION=true
      - IMGPROXY_ENFORCE_WEBP=true
      - IMGPROXY_QUALITY=80
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_CACHE_CONTROL_PASSTHROUGH=false
      - IMGPROXY_SET_CANONICAL_HEADER=true
    restart: unless-stopped
    networks:
      - app_net

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: total_kz_umami
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://umami:umami@umami-db:5432/umami
      - APP_SECRET=total-kz-umami-secret-2026
    depends_on:
      - umami-db
    restart: unless-stopped
    networks:
      - app_net

  umami-db:
    image: postgres:15-alpine
    container_name: total_kz_umami_db
    volumes:
      - umami_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=umami
    restart: unless-stopped
    networks:
      - app_net

volumes:
  meili_data:
  umami_data:

networks:
  app_net:
    name: total_kz_net
    driver: bridge
