# total-kz — Docker Compose
# Platform standard: belilovsky-platform v1.0

services:
  app:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: total_kz_app
    restart: unless-stopped
    env_file: .env
    environment:
      - SITE_DOMAIN=https://total.qdev.run
    ports:
      - "${APP_PORT:-3847}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - app_net

  cron:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: total_kz_cron
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      meilisearch:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Cron container started ==="
        chmod +x /app/scraper/cron_*.sh

        # Initial: reindex Meilisearch + backup
        /app/scraper/cron_reindex.sh >> /app/data/cron_reindex.log 2>&1
        /app/scraper/cron_backup.sh >> /app/data/cron_backup.log 2>&1

        COUNTER=0
        while true; do
          COUNTER=$$((COUNTER + 1))

          # Каждые 2 часа: fetch новых статей
          /app/scraper/cron_fetch.sh >> /app/data/cron_fetch.log 2>&1

          # После fetch: переиндексация Meilisearch
          /app/scraper/cron_reindex.sh >> /app/data/cron_reindex.log 2>&1

          # Каждые 4 часа (каждый 2-й цикл): обогащение GPT
          if [ $$((COUNTER % 2)) -eq 0 ]; then
            /app/scraper/cron_enrich.sh >> /app/data/cron_enrich.log 2>&1
          fi

          # Каждые 24 часа (каждый 12-й цикл): бэкап БД
          if [ $$((COUNTER % 12)) -eq 0 ]; then
            /app/scraper/cron_backup.sh >> /app/data/cron_backup.log 2>&1
          fi

          sleep 7200
        done
    networks:
      - app_net

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: total_kz_meilisearch
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=total-kz-search-key-2026
      - MEILI_DB_PATH=/meili_data
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    networks:
      - app_net

  imgproxy:
    image: darthsim/imgproxy:v3.27
    container_name: total_kz_imgproxy
    # No host port needed — app connects via internal Docker network
    expose:
      - "8080"
    environment:
      - IMGPROXY_BIND=:8080
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_ALLOWED_SOURCES=https://total.kz/,http://total.kz/
      - IMGPROXY_ENABLE_WEBP_DETECTION=true
      - IMGPROXY_ENFORCE_WEBP=true
      - IMGPROXY_QUALITY=80
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_CACHE_CONTROL_PASSTHROUGH=false
      - IMGPROXY_SET_CANONICAL_HEADER=true
    restart: unless-stopped
    networks:
      - app_net

  db:
    image: pgvector/pgvector:pg16
    container_name: total_kz_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5437}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-total_kz}
      POSTGRES_USER: ${DB_USER:-total_kz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-total_kz} -d ${DB_NAME:-total_kz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: total_kz_umami
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://umami:umami@umami-db:5432/umami
      - APP_SECRET=total-kz-umami-secret-2026
      - BASE_PATH=/umami
    depends_on:
      - umami-db
    restart: unless-stopped
    networks:
      - app_net

  umami-db:
    image: postgres:15-alpine
    container_name: total_kz_umami_db
    volumes:
      - umami_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=umami
    restart: unless-stopped
    networks:
      - app_net

volumes:
  meili_data:
  umami_data:
  pgdata:
    name: total_kz_pgdata

networks:
  app_net:
    name: total_kz_net
    driver: bridge
