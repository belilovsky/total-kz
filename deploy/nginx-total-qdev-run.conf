# total.qdev.run — Nginx reverse proxy
# After certbot: certbot --nginx -d total.qdev.run
# Place at: /etc/nginx/sites-available/total.qdev.run
# Activate: ln -s /etc/nginx/sites-available/total.qdev.run /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name total.qdev.run;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name total.qdev.run;

    # Certbot will fill these in:
    ssl_certificate /etc/letsencrypt/live/total.qdev.run/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/total.qdev.run/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # ── Main app (port 3847) ──
    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed for future features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Upload limit (for article images)
        client_max_body_size 50M;
    }

    # ── Static files — longer cache ──
    location /static/ {
        proxy_pass http://127.0.0.1:3847/static/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Umami analytics dashboard (internal access) ──
    # Access at: https://total.qdev.run/umami/
    location /umami/ {
        # Basic auth — protect analytics dashboard
        # Create: htpasswd -c /etc/nginx/.htpasswd admin
        # auth_basic "Analytics";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/umami(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Umami tracking script — must be public (no auth) ──
    location = /umami/script.js {
        rewrite ^/umami(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1h;
    }

    # ── Umami API — must be public for tracking to work ──
    location /umami/api/send {
        rewrite ^/umami(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
