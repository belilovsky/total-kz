# total.kz — Production Nginx Config (hardened)
# Deploy: cp deploy/nginx/total.conf /etc/nginx/sites-available/total.conf
#         ln -sf /etc/nginx/sites-available/total.conf /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=admin:1m rate=2r/s;

# ── Connection Limiting ──
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── Proxy Cache ──
proxy_cache_path /var/cache/nginx/total levels=1:2
                 keys_zone=microcache:10m max_size=100m inactive=10m;

# ── Cloudflare Real IP Restore ──
# Uncomment when Cloudflare is enabled:
# set_real_ip_from 173.245.48.0/20;
# set_real_ip_from 103.21.244.0/22;
# set_real_ip_from 103.22.200.0/22;
# set_real_ip_from 103.31.4.0/22;
# set_real_ip_from 141.101.64.0/18;
# set_real_ip_from 108.162.192.0/18;
# set_real_ip_from 190.93.240.0/20;
# set_real_ip_from 188.114.96.0/20;
# set_real_ip_from 197.234.240.0/22;
# set_real_ip_from 198.41.128.0/17;
# set_real_ip_from 162.158.0.0/15;
# set_real_ip_from 104.16.0.0/13;
# set_real_ip_from 104.24.0.0/14;
# set_real_ip_from 172.64.0.0/13;
# set_real_ip_from 131.0.72.0/22;
# set_real_ip_from 2400:cb00::/32;
# set_real_ip_from 2606:4700::/32;
# set_real_ip_from 2803:f800::/32;
# set_real_ip_from 2405:b500::/32;
# set_real_ip_from 2405:8100::/32;
# set_real_ip_from 2a06:98c0::/29;
# set_real_ip_from 2c0f:f248::/32;
# real_ip_header CF-Connecting-IP;

# ── Block requests without Host header ──
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/total.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/total.kz/privkey.pem;

    return 444;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name total.kz www.total.kz;
    return 301 https://total.kz$request_uri;
}

# ── Main HTTPS server ──
server {
    listen 443 ssl http2;
    server_name total.kz www.total.kz;

    # Redirect www to non-www
    if ($host = www.total.kz) {
        return 301 https://total.kz$request_uri;
    }

    # ── SSL ──
    ssl_certificate /etc/letsencrypt/live/total.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/total.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://cloud.umami.is; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Connection limit per IP ──
    limit_conn perip 50;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/x-font-ttf font/opentype;

    # ── Brotli (if module available) ──
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript
    #              text/xml application/xml text/javascript image/svg+xml;

    # ── Admin area — strict rate limiting ──
    location /admin/ {
        limit_req zone=admin burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        client_max_body_size 50M;
    }

    # ── imgproxy — long cache ──
    location /imgproxy/ {
        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static files — long cache ──
    location /static/ {
        proxy_pass http://127.0.0.1:3847/static/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Homepage — microcache 5s ──
    location = / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_cache microcache;
        proxy_cache_valid 200 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        client_max_body_size 50M;
    }

    # ── Category pages — microcache 30s ──
    location ~ ^/category/ {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_cache microcache;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        client_max_body_size 50M;
    }

    # ── Health check — no rate limit, no cache ──
    location = /health {
        proxy_pass http://127.0.0.1:3847/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── All other routes — general rate limit ──
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3847;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 50M;
    }
}
