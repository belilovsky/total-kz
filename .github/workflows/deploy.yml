name: 🚀 Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск из GitHub UI

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🔑 Connect and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "=== Deploy started at $(date) ==="
            cd /opt/total-kz

            # Бэкап SQLite перед деплоем
            cp data/total.db data/total.db.bak 2>/dev/null && echo "✅ DB backed up" || echo "⚠️ No DB to backup"

            # Обновляем код
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated: $(git log -1 --oneline)"

            # Пересобираем только app-контейнер (DB/Meilisearch/imgproxy не трогаем)
            docker compose up -d --build --no-deps app
            echo "✅ Container rebuilt"

            # Ждём healthcheck (до 60 сек)
            echo "⏳ Waiting for healthcheck..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' total_kz_app 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ App is healthy!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ Healthcheck failed — rolling back!"
                git reset --hard HEAD~1
                docker compose up -d --build --no-deps app
                exit 1
              fi
              sleep 5
            done

            # Логируем деплой
            echo "$(date) | $(git log -1 --oneline)" >> /opt/total-kz/data/deploy.log

            echo "=== ✅ Deploy finished at $(date) ==="
