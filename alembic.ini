# Alembic configuration for total-kz PostgreSQL migration.
# The actual sqlalchemy.url is overridden at runtime from app.config.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden by env.py from app.config.settings
sqlalchemy.url = postgresql://total_kz:total_kz@db-pg:5432/total_kz

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
